name: Test RELEASE_PAT

# One-off validation that RELEASE_PAT authenticates and can push tags.
# Delete this file after use.

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Verify token identity
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          echo "Authenticated as:"
          gh api user --jq '.login'

      - name: Push and delete a throwaway tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG="test-release-pat-$(date +%s)"
          git tag -a "$TAG" -m "RELEASE_PAT validation (auto-deleted)"
          git push origin "$TAG"
          echo "Created $TAG"
          git push --delete origin "$TAG"
          echo "Deleted $TAG"
