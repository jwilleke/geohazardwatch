name: Renovate

# Self-hosted Renovate. Runs as a scheduled GitHub Action against the existing
# renovate.json at the repo root. No dependency on Mend's hosted service.
#
# What it does:
#   - Polls dependency sources (GHCR for the ngdpbase base image, npm for
#     deps) every hour.
#   - Opens PRs for available updates.
#   - Auto-merges minor + patch updates per the rules in renovate.json
#     (ngdpbase base image and npm deps): opens a PR (automergeType: "pr"),
#     which triggers ci.yml's normal pull_request-scoped checks, then
#     GitHub's native automerge (platformAutomerge: true) merges it once
#     green. Do NOT switch this to automergeType: "branch" — that skips
#     opening a PR until the bare branch itself shows a green status, but
#     ci.yml only triggers on pull_request/push-to-main, so a bare branch
#     never gets any check runs and sits "pending" forever. This silently
#     deadlocked the ngdpbase auto-bump for ~15h (2026-07-20 20:40 through
#     2026-07-21 11:26, discovered when v3.54.0/v3.55.0 both failed to land
#     despite the cron running hourly the whole time) before being caught.
#   - Auto-merged Dockerfile bumps trigger auto-tag.yml → publish-image.yml,
#     which is the whole point — keeps this satellite current with upstream
#     ngdpbase patches and minors without operator action.
#
# Required secret:
#   RENOVATE_TOKEN — fine-grained PAT scoped to this repo with:
#     - Contents: read & write
#     - Pull requests: read & write
#     - Workflows: read & write
#   The Workflows scope is required so Renovate's auto-merged commits trigger
#   downstream workflows (auto-tag.yml etc.). The default GITHUB_TOKEN cannot
#   trigger other workflows, which would break the rebuild cascade.
#
#   Operator may reuse RELEASE_PAT for this secret if its scopes match.
#
# Trigger context: jwilleke/ngdpbase#680.

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:
    inputs:
      debug:
        description: 'Run with LOG_LEVEL=debug (geohazardwatch#143 — automerge diagnosis)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run Renovate
        # renovatebot/github-action doesn't publish a moving major tag (no @v46);
        # only specific patches like v46.1.14 exist. Pin to a specific patch and
        # let Renovate itself bump this line in future runs.
        uses: renovatebot/github-action@v46.1.20
        env:
          # Tell Renovate exactly which repo to scan. Earlier attempt used
          # RENOVATE_AUTODISCOVER=true assuming the PAT was scoped narrowly
          # enough that discovery would only see this one repo, but in
          # practice the token sees other repos the user owns (docker-demo,
          # ESP32-tests, etc.) and Renovate tried to act on them. Explicit
          # single-repo pin is the safe form.
          RENOVATE_REPOSITORIES: "jwilleke/geohazardwatch"
          # geohazardwatch#143: manual workflow_dispatch with debug=true bumps
          # this to see automerge-decision log lines the default info level
          # doesn't surface. Scheduled/non-debug runs are unaffected (defaults
          # to unset, which renovate treats as its normal default level).
          LOG_LEVEL: ${{ inputs.debug && 'debug' || '' }}
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: renovate.json
